<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eid Salami — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold: #c9a84c;
      --gold-light: #f0d080;
      --green-deep: #0d3b2e;
      --cream: #fdf8ee;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      min-height: 100vh;
      background: var(--green-deep);
      font-family: 'Lato', sans-serif;
      color: var(--cream);
    }
    body::before {
      content:''; position:fixed; inset:0;
      background-image: repeating-linear-gradient(60deg, transparent, transparent 40px, rgba(201,168,76,0.04) 40px, rgba(201,168,76,0.04) 41px),
        repeating-linear-gradient(-60deg, transparent, transparent 40px, rgba(201,168,76,0.04) 40px, rgba(201,168,76,0.04) 41px);
      pointer-events:none; z-index:0;
    }

    /* ── Password gate ── */
    #gate {
      position: fixed; inset:0;
      background: var(--green-deep);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; flex-direction: column; gap: 16px;
    }
    #gate h2 { font-family:'Playfair Display',serif; color:var(--gold-light); font-size:1.6rem; }
    #gate input {
      background: rgba(255,255,255,0.08); border: 1.5px solid rgba(201,168,76,0.3);
      border-radius:10px; padding:12px 20px; color:var(--cream); font-size:1rem;
      width: 240px; outline:none; text-align:center; letter-spacing: 4px;
    }
    #gate button {
      background: linear-gradient(135deg,var(--gold),#a07830); border:none;
      border-radius:10px; padding:12px 32px; font-family:'Playfair Display',serif;
      font-size:1rem; font-weight:700; color:#0d3b2e; cursor:pointer;
    }
    #gate .err { color:#ff8080; font-size:0.85rem; }

    /* ── Main ── */
    .wrapper { position:relative; z-index:1; max-width:680px; margin:0 auto; padding:40px 20px 80px; }
    header { text-align:center; margin-bottom:36px; }
    header h1 { font-family:'Playfair Display',serif; font-size:2.2rem; color:var(--gold-light); }
    header p { font-size:0.8rem; letter-spacing:3px; text-transform:uppercase; color:rgba(253,248,238,0.4); margin-top:6px; }

    /* ── Stats bar ── */
    .stats {
      display:grid; grid-template-columns: repeat(3, 1fr); gap:16px; margin-bottom:32px;
    }
    .stat {
      background: rgba(255,255,255,0.05); border:1px solid rgba(201,168,76,0.2);
      border-radius:14px; padding:18px; text-align:center;
    }
    .stat .val { font-family:'Playfair Display',serif; font-size:2rem; color:var(--gold-light); }
    .stat .lbl { font-size:0.7rem; letter-spacing:2px; text-transform:uppercase; color:rgba(253,248,238,0.4); margin-top:4px; }

    /* ── Table ── */
    .table-wrap { background:rgba(255,255,255,0.04); border:1px solid rgba(201,168,76,0.2); border-radius:16px; overflow:hidden; }
    table { width:100%; border-collapse:collapse; }
    th {
      background: rgba(201,168,76,0.15); padding:14px 20px; text-align:left;
      font-size:0.75rem; letter-spacing:2px; text-transform:uppercase;
      color:var(--gold); font-weight:700;
    }
    td { padding:14px 20px; border-top:1px solid rgba(255,255,255,0.06); font-size:0.95rem; }
    tr:hover td { background:rgba(255,255,255,0.03); }
    .amt { font-family:'Playfair Display',serif; font-weight:700; color:var(--gold-light); }
    .badge-taken { background:rgba(30,125,82,0.3); border:1px solid rgba(30,125,82,0.5); color:#6fd9a0; padding:3px 10px; border-radius:20px; font-size:0.75rem; }
    .badge-free  { background:rgba(201,168,76,0.1); border:1px solid rgba(201,168,76,0.3); color:var(--gold); padding:3px 10px; border-radius:20px; font-size:0.75rem; }

    /* ── Reset button ── */
    .danger-zone { margin-top:40px; text-align:center; }
    .btn-reset {
      background:transparent; border:1px solid rgba(255,80,80,0.3); border-radius:10px;
      color:rgba(255,120,120,0.7); padding:10px 24px; cursor:pointer; font-size:0.85rem;
      font-family:'Lato',sans-serif; letter-spacing:1px; transition:all 0.2s;
    }
    .btn-reset:hover { border-color:rgba(255,80,80,0.7); color:#ff8080; }

    .back { text-align:center; margin-top:30px; }
    .back a { color:rgba(253,248,238,0.3); font-size:0.8rem; text-decoration:none; letter-spacing:2px; }
    .back a:hover { color:var(--gold); }

    #loading { position:fixed; inset:0; background:var(--green-deep); display:flex; align-items:center; justify-content:center; z-index:100; }
    #loading span { font-size:3rem; animation:sway 1s infinite; }
    @keyframes sway { 0%,100%{transform:rotate(-8deg)} 50%{transform:rotate(8deg)} }
  </style>
</head>
<body>

<!-- Password Gate -->
<div id="gate">
  <h2>🔐 Admin Access</h2>
  <input type="password" id="pw-input" placeholder="Password" onkeydown="if(event.key==='Enter')checkPw()" />
  <button onclick="checkPw()">Enter</button>
  <p class="err" id="pw-err"></p>
</div>

<div id="loading" style="display:none"><span>🌙</span></div>

<div class="wrapper" id="main-content" style="display:none">
  <header>
    <h1>⚙ Admin Dashboard</h1>
    <p>Eid Salami — Live Tracker</p>
  </header>

  <div class="stats">
    <div class="stat"><div class="val" id="stat-total">—</div><div class="lbl">Total Slots</div></div>
    <div class="stat"><div class="val" id="stat-claimed">—</div><div class="lbl">Claimed</div></div>
    <div class="stat"><div class="val" id="stat-sum">—</div><div class="lbl">Total ৳ Given</div></div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Amount (৳)</th>
          <th>Claimed By</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="claims-body"></tbody>
    </table>
  </div>

  <div class="danger-zone">
    <button class="btn-reset" onclick="resetGame()">🗑 Reset All Claims</button>
  </div>

  <div class="back"><a href="index.html">← Back to main page</a></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // ── 🔴 REPLACE WITH YOUR FIREBASE CONFIG (same as index.html) ──
  const firebaseConfig = {
  apiKey: "AIzaSyByEMgpzcuZ2B7koGGRJlAzA1pd3zLR8Ik",
  authDomain: "eid-salami-61058.firebaseapp.com",
  projectId: "eid-salami-61058",
  storageBucket: "eid-salami-61058.firebasestorage.app",
  messagingSenderId: "573766263071",
  appId: "1:573766263071:web:7cbf542d5bea9275c2d02a"
};
  // ────────────────────────────────────────────────────────────────

  // ── Password (change this!) ──
  const ADMIN_PASSWORD = "eid2025";

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const stateRef = doc(db, "eid", "salami");

  window.checkPw = function() {
    const val = document.getElementById("pw-input").value;
    if (val === ADMIN_PASSWORD) {
      document.getElementById("gate").style.display = "none";
      document.getElementById("loading").style.display = "flex";
      startAdmin();
    } else {
      document.getElementById("pw-err").textContent = "Wrong password!";
    }
  };

  function startAdmin() {
    onSnapshot(stateRef, snap => {
      document.getElementById("loading").style.display = "none";
      document.getElementById("main-content").style.display = "block";
      if (!snap.exists()) return;
      const amounts = snap.data().amounts;
      render(amounts);
    });
  }

  function render(amounts) {
    const claimed = amounts.filter(a => a.takenBy);
    const sumGiven = claimed.reduce((s, a) => s + a.value, 0);

    document.getElementById("stat-total").textContent = amounts.length;
    document.getElementById("stat-claimed").textContent = claimed.length;
    document.getElementById("stat-sum").textContent = "৳" + sumGiven;

    const tbody = document.getElementById("claims-body");
    tbody.innerHTML = "";
    amounts.forEach((a, i) => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td style="color:rgba(253,248,238,0.3)">${i+1}</td>
        <td class="amt">৳${a.value}</td>
        <td>${a.takenBy || '<span style="color:rgba(253,248,238,0.3)">—</span>'}</td>
        <td>${a.takenBy ? '<span class="badge-taken">✓ Claimed</span>' : '<span class="badge-free">Available</span>'}</td>
      `;
      tbody.appendChild(tr);
    });
  }

  window.resetGame = async function() {
    if (!confirm("Reset ALL claims? This cannot be undone!")) return;
    const snap = await (await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js")).getDoc(stateRef);
    if (!snap.exists()) return;
    const newAmounts = snap.data().amounts.map(a => ({ value: a.value, takenBy: null }));
    await updateDoc(stateRef, { amounts: newAmounts });
    alert("All claims reset!");
  };
</script>
</body>
</html>
