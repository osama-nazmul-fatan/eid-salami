<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eid Salami 🌙⭐</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+Da+2:wght@400;600;700;800&family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --purple-deep:  #1a0533;
      --purple-mid:   #3b0d6e;
      --purple-bright:#7b2ff7;
      --purple-light: #b57bee;
      --yellow:       #ffe94d;
      --yellow-soft:  #fff3a3;
      --yellow-glow:  #ffd700;
      --white:        #ffffff;
      --cream:        #fff8e7;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      min-height: 100vh;
      font-family: 'Baloo Da 2', 'Hind Siliguri', sans-serif;
      background: radial-gradient(ellipse at top, #2d0a5e 0%, #1a0533 50%, #0d0220 100%);
      color: var(--white);
      overflow-x: hidden;
    }

    /* ── Twinkling stars background ── */
    #stars-canvas {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
    }

    /* ── Floating bokeh blobs ── */
    .blob {
      position: fixed; border-radius: 50%;
      filter: blur(80px); opacity: 0.18;
      pointer-events: none; z-index: 0;
      animation: blob-drift linear infinite;
    }
    .blob1 { width:400px; height:400px; background:var(--purple-bright); top:-100px; left:-100px; animation-duration:20s; }
    .blob2 { width:300px; height:300px; background:var(--yellow); top:40%; right:-80px; animation-duration:25s; animation-delay:-8s; }
    .blob3 { width:350px; height:350px; background:#ff6bdf; bottom:-80px; left:30%; animation-duration:18s; animation-delay:-5s; }
    @keyframes blob-drift {
      0%,100% { transform: translate(0,0) scale(1); }
      33%      { transform: translate(30px,-40px) scale(1.08); }
      66%      { transform: translate(-20px,20px) scale(0.95); }
    }

    .wrapper { position: relative; z-index: 1; max-width: 700px; margin: 0 auto; padding: 0 18px 80px; }

    /* ── HERO HEADER ── */
    .hero {
      text-align: center;
      padding: 40px 0 30px;
      position: relative;
    }

    /* Moon + stars SVG hero */
    .moon-hero {
      position: relative;
      display: inline-block;
      margin-bottom: 10px;
    }
    .moon-svg {
      width: 130px; height: 130px;
      filter: drop-shadow(0 0 30px rgba(255,233,77,0.8)) drop-shadow(0 0 60px rgba(255,233,77,0.4));
      animation: moon-float 5s ease-in-out infinite;
    }
    @keyframes moon-float {
      0%,100% { transform: translateY(0) rotate(-5deg); }
      50%      { transform: translateY(-14px) rotate(5deg); }
    }
    .star-orbit {
      position: absolute;
      top: 12px; right: -14px;
      font-size: 2.2rem;
      animation: star-spin 6s ease-in-out infinite;
      filter: drop-shadow(0 0 10px var(--yellow));
    }
    @keyframes star-spin {
      0%,100% { transform: rotate(-15deg) scale(1); }
      50%      { transform: rotate(20deg) scale(1.2); }
    }

    .eid-mubarak {
      font-size: clamp(2.6rem, 8vw, 4.5rem);
      font-weight: 800;
      background: linear-gradient(135deg, var(--yellow) 0%, #ffb800 40%, var(--yellow-soft) 60%, var(--yellow-glow) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.05;
      text-shadow: none;
      filter: drop-shadow(0 0 20px rgba(255,233,77,0.5));
      animation: shimmer 3s ease-in-out infinite;
      background-size: 200% auto;
    }
    @keyframes shimmer {
      0%   { background-position: 0% center; }
      50%  { background-position: 100% center; }
      100% { background-position: 0% center; }
    }

    .eid-arabic {
      font-size: 1.1rem;
      color: var(--purple-light);
      letter-spacing: 4px;
      margin-top: 4px;
      opacity: 0.85;
    }

    /* ── SLOGAN BANNER ── */
    .slogan-banner {
      margin: 18px auto;
      max-width: 520px;
      background: linear-gradient(135deg, rgba(123,47,247,0.4), rgba(255,233,77,0.15));
      border: 2px solid rgba(255,233,77,0.5);
      border-radius: 50px;
      padding: 14px 28px;
      text-align: center;
      box-shadow: 0 0 30px rgba(123,47,247,0.4), inset 0 0 20px rgba(255,233,77,0.05);
      animation: border-glow 3s ease-in-out infinite;
    }
    @keyframes border-glow {
      0%,100% { box-shadow: 0 0 20px rgba(123,47,247,0.4), inset 0 0 15px rgba(255,233,77,0.05); }
      50%      { box-shadow: 0 0 40px rgba(123,47,247,0.7), 0 0 60px rgba(255,233,77,0.2), inset 0 0 20px rgba(255,233,77,0.08); }
    }
    .slogan-text {
      font-family: 'Hind Siliguri', sans-serif;
      font-size: clamp(1rem, 3.5vw, 1.25rem);
      font-weight: 700;
      background: linear-gradient(90deg, var(--yellow), #ff9de2, var(--yellow));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      background-size: 200% auto;
      animation: shimmer 4s ease-in-out infinite;
    }

    /* ── Decorative divider ── */
    .divider {
      display: flex; align-items: center; gap: 10px;
      margin: 24px 0 20px;
    }
    .divider::before,.divider::after {
      content:''; flex:1; height:1.5px;
      background: linear-gradient(90deg, transparent, rgba(255,233,77,0.6), transparent);
    }
    .divider-icons { display:flex; gap:6px; align-items:center; }
    .divider-icons span { font-size: 1.1rem; }

    /* ── Amounts section ── */
    .amounts-section { margin-bottom: 28px; }
    .section-title {
      text-align: center;
      font-size: 0.8rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--purple-light);
      margin-bottom: 16px;
    }

    .amounts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(105px, 1fr));
      gap: 12px;
    }

    .amount-chip {
      position: relative; overflow: hidden;
      background: linear-gradient(135deg, rgba(123,47,247,0.35), rgba(58,13,110,0.6));
      border: 1.5px solid rgba(255,233,77,0.35);
      border-radius: 16px;
      padding: 16px 10px 12px;
      text-align: center;
      cursor: default;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .amount-chip::before {
      content: '';
      position: absolute; top:0; left:-60%;
      width:40%; height:100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.07), transparent);
      animation: chip-shine 4s ease-in-out infinite;
    }
    @keyframes chip-shine {
      0%   { left:-60%; }
      50%  { left:160%; }
      100% { left:160%; }
    }
    .amount-chip:hover:not(.taken) { transform: translateY(-4px) scale(1.04); box-shadow: 0 8px 24px rgba(123,47,247,0.5); }
    .amount-chip .tk-label { font-size: 0.6rem; letter-spacing: 2px; color: var(--purple-light); text-transform:uppercase; display:block; margin-bottom:3px; }
    .amount-chip .tk-val {
      font-size: 1.4rem; font-weight: 800;
      background: linear-gradient(135deg, var(--yellow), #ffb400);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .amount-chip.taken {
      background: rgba(40,10,70,0.5);
      border-color: rgba(255,255,255,0.08);
      filter: grayscale(0.4);
    }
    .amount-chip.taken .tk-val {
      background: rgba(255,255,255,0.2);
      -webkit-background-clip: text; background-clip: text;
      text-decoration: line-through;
      text-decoration-color: rgba(255,80,80,0.7);
    }
    .taken-by-name { display:block; font-size:0.55rem; color: rgba(255,255,255,0.35); margin-top:4px; line-height:1.2; word-break:break-word; }
    .taken-star { font-size:0.65rem; }

    /* ── Claim card ── */
    .card {
      background: linear-gradient(135deg, rgba(58,13,110,0.7), rgba(26,5,51,0.85));
      border: 1.5px solid rgba(255,233,77,0.3);
      border-radius: 24px;
      padding: 32px 28px;
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(123,47,247,0.2);
    }
    .card-title {
      text-align: center;
      font-size: 1.4rem; font-weight: 800;
      color: var(--yellow);
      margin-bottom: 22px;
    }
    .card-title span { font-size: 1.5rem; }

    label {
      display:block;
      font-size: 0.75rem; letter-spacing: 3px; text-transform: uppercase;
      color: var(--purple-light); margin-bottom: 8px;
    }
    input[type="text"] {
      width: 100%;
      background: rgba(255,255,255,0.07);
      border: 1.5px solid rgba(255,233,77,0.25);
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 1.05rem; font-weight: 600;
      color: var(--white);
      font-family: 'Baloo Da 2', sans-serif;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    input[type="text"]:focus {
      border-color: var(--yellow);
      box-shadow: 0 0 0 3px rgba(255,233,77,0.15);
    }
    input::placeholder { color: rgba(255,255,255,0.2); font-weight:400; }

    .claim-btn {
      margin-top: 20px; width: 100%;
      padding: 17px 20px;
      background: linear-gradient(135deg, #ffe94d 0%, #ffb400 50%, #ff8c00 100%);
      border: none; border-radius: 16px;
      font-family: 'Baloo Da 2', sans-serif;
      font-size: 1.2rem; font-weight: 800;
      color: var(--purple-deep);
      cursor: pointer; letter-spacing: 0.5px;
      box-shadow: 0 6px 30px rgba(255,180,0,0.5);
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative; overflow: hidden;
    }
    .claim-btn::after {
      content:'';
      position:absolute; inset:0;
      background: linear-gradient(135deg, rgba(255,255,255,0.3), transparent);
      opacity: 0; transition: opacity 0.2s;
    }
    .claim-btn:hover:not(:disabled) { transform:translateY(-3px); box-shadow: 0 12px 40px rgba(255,180,0,0.6); }
    .claim-btn:hover:not(:disabled)::after { opacity: 1; }
    .claim-btn:active:not(:disabled) { transform:translateY(0); }
    .claim-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .error { color: #ff8080; font-size:0.85rem; margin-top:10px; text-align:center; min-height:20px; }

    /* ── Spinner ── */
    #spinner {
      display: none;
      text-align: center;
      margin-top: 28px;
      padding: 28px;
    }
    .spin-ring {
      width: 80px; height: 80px;
      border: 4px solid rgba(255,233,77,0.2);
      border-top-color: var(--yellow);
      border-radius: 50%;
      margin: 0 auto 16px;
      animation: ring-spin 0.6s linear infinite;
    }
    @keyframes ring-spin { to { transform: rotate(360deg); } }
    .spin-label { font-size: 0.8rem; letter-spacing:3px; text-transform:uppercase; color: var(--purple-light); }
    .spin-number {
      font-size: 3rem; font-weight: 800;
      background: linear-gradient(135deg, var(--yellow), #ff9de2);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      transition: opacity 0.05s;
    }

    /* ── Result panel ── */
    #result-panel {
      display: none;
      text-align: center;
      margin-top: 28px;
      padding: 36px 28px;
      background: linear-gradient(135deg, rgba(123,47,247,0.35), rgba(255,180,0,0.12));
      border: 2px solid var(--yellow);
      border-radius: 24px;
      box-shadow: 0 0 60px rgba(255,233,77,0.25), 0 0 120px rgba(123,47,247,0.2);
      animation: pop 0.6s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes pop { from{transform:scale(0.6) rotate(-4deg);opacity:0} to{transform:scale(1) rotate(0);opacity:1} }
    .result-emoji { font-size: 3rem; display:block; margin-bottom:8px; }
    .result-congrats {
      font-size: 1.1rem; color: var(--purple-light); margin-bottom:4px;
      font-family: 'Hind Siliguri', sans-serif;
    }
    .result-name { font-size: 1.5rem; font-weight:800; color: var(--white); margin-bottom: 16px; }
    .result-got { font-size:0.8rem; letter-spacing:3px; text-transform:uppercase; color:rgba(255,255,255,0.4); }
    .result-amount-wrap {
      margin: 8px 0 16px;
      display: inline-flex; align-items: baseline; gap: 6px;
    }
    .result-taka { font-size: 2rem; font-weight:800; color: var(--yellow); }
    .result-amount {
      font-size: clamp(3.5rem, 12vw, 6rem);
      font-weight: 800;
      background: linear-gradient(135deg, var(--yellow) 0%, #ffb400 50%, #ff6b6b 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      filter: drop-shadow(0 0 20px rgba(255,233,77,0.6));
      line-height: 1;
    }
    .result-note {
      font-family: 'Hind Siliguri', sans-serif;
      font-size: 1rem; color: rgba(255,255,255,0.5);
      margin-top: 10px;
    }

    /* ── Confetti ── */
    .confetti-piece {
      position: fixed; width:8px; height:14px;
      top: -20px; border-radius: 3px;
      animation: confetti-fall linear forwards;
      pointer-events: none; z-index: 999;
    }
    @keyframes confetti-fall {
      to { transform: translateY(110vh) rotate(720deg); opacity:0; }
    }

    /* ── Floating Eid decorations ── */
    .float-deco {
      position: fixed; font-size: 1.8rem;
      pointer-events: none; z-index: 0;
      animation: float-around ease-in-out infinite;
      opacity: 0.25;
    }
    .fd1 { top:8%; left:3%;  animation-duration:7s;  }
    .fd2 { top:15%; right:5%; animation-duration:9s;  animation-delay:-3s; }
    .fd3 { top:55%; left:2%; animation-duration:11s; animation-delay:-6s; }
    .fd4 { top:75%; right:3%; animation-duration:8s; animation-delay:-2s; }
    .fd5 { top:38%; right:2%; animation-duration:10s; animation-delay:-5s; }
    @keyframes float-around {
      0%,100% { transform: translateY(0) rotate(-10deg) scale(1); }
      50%      { transform: translateY(-20px) rotate(10deg) scale(1.1); }
    }

    /* ── Admin link ── */
    .admin-link { text-align:center; margin-top:50px; }
    .admin-link a { color:rgba(255,255,255,0.12); font-size:0.72rem; text-decoration:none; letter-spacing:2px; }
    .admin-link a:hover { color: var(--yellow); }

    /* ── Loading ── */
    #loading {
      position:fixed; inset:0;
      background: radial-gradient(ellipse at top, #2d0a5e, #0d0220);
      display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; gap:16px;
    }
    .loading-moon { font-size:4rem; animation: moon-float 2s ease-in-out infinite; }
    .loading-txt { font-size:0.8rem; letter-spacing:4px; text-transform:uppercase; color:var(--purple-light); animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

    /* Scrollbar */
    ::-webkit-scrollbar { width:6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(123,47,247,0.5); border-radius:10px; }
  </style>
</head>

<!-- Stars script -->
<script>
  const canvas = document.getElementById("stars-canvas");
  const ctx = canvas.getContext("2d");
  let stars = [];

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener("resize", resize);
  resize();

  for (let i = 0; i < 160; i++) {
    stars.push({
      x: Math.random(),
      y: Math.random(),
      r: Math.random() * 1.6 + 0.3,
      a: Math.random(),
      speed: Math.random() * 0.015 + 0.005,
      phase: Math.random() * Math.PI * 2
    });
  }

  function drawStars(t) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      const alpha = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(t * s.speed + s.phase));
      ctx.beginPath();
      ctx.arc(s.x * canvas.width, s.y * canvas.height, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,240,180,${alpha})`;
      ctx.fill();
    });
    requestAnimationFrame(drawStars);
  }
  requestAnimationFrame(drawStars);
</script>

  messagingSenderId: "573766263071",
  appId: "1:573766263071:web:7cbf542d5bea9275c2d02a"
};
  // ──────────────────────────────────────────

  // ── Amounts you want (edit these!) ──
  const DEFAULT_AMOUNTS = [30, 30, 30, 30, 30, 30, 50, 50, 50, 50, 50, 50, 50, 50, 150, 150];

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);
  const stateRef = doc(db, "eid", "salami");

  async function ensureDoc() {
    const snap = await getDoc(stateRef);
    if (!snap.exists()) {
      const { setDoc } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");
      await setDoc(stateRef, {
        amounts: DEFAULT_AMOUNTS.map(v => ({ value: v, takenBy: null }))
      });
    }
  }

  function renderGrid(amounts) {
    const grid = document.getElementById("amounts-grid");
    grid.innerHTML = "";
    amounts.forEach(a => {
      const chip = document.createElement("div");
      chip.className = "amount-chip" + (a.takenBy ? " taken" : "");
      chip.innerHTML = `
        <span class="tk-label">BDT</span>
        <span class="tk-val">৳${a.value}</span>
        ${a.takenBy ? `<span class="taken-by-name">✓ Claimed</span>` : ""}
      `;
      grid.appendChild(chip);
    });
  }

  function listen() {
    onSnapshot(stateRef, snap => {
      if (snap.exists()) renderGrid(snap.data().amounts);
      document.getElementById("loading").style.display = "none";
    });
  }

  window.claimSalami = async function () {
    const nameEl = document.getElementById("name-input");
    const errEl  = document.getElementById("error-msg");
    const btn    = document.getElementById("claim-btn");
    const name   = nameEl.value.trim();
    errEl.textContent = "";

    if (!name) { errEl.textContent = "আগে তোমার নাম লেখো! 😊"; return; }

    btn.disabled = true;

    const snap = await getDoc(stateRef);
    if (!snap.exists()) { errEl.textContent = "Error! Refresh and try again."; btn.disabled=false; return; }

    const data = snap.data();
    const alreadyClaimed = data.amounts.find(a => a.takenBy === name);
    if (alreadyClaimed) { errEl.textContent = `${name} তো আগেই ৳${alreadyClaimed.value} নিয়েছে! 😄`; btn.disabled=false; return; }

    const available = data.amounts.filter(a => !a.takenBy);
    if (available.length === 0) { errEl.textContent = "সব সালামি শেষ! পরের ঈদে এসো 😢"; btn.disabled=false; return; }

    // Spinner
    const spinEl = document.getElementById("spinner");
    const spinDisplay = document.getElementById("spin-display");
    spinEl.style.display = "block";
    spinEl.scrollIntoView({ behavior: "smooth", block: "center" });

    const spinInterval = setInterval(() => {
      const rand = available[Math.floor(Math.random() * available.length)];
      spinDisplay.textContent = "৳" + rand.value;
    }, 80);

    await new Promise(r => setTimeout(r, 2400));
    clearInterval(spinInterval);
    spinEl.style.display = "none";

    const chosen = available[Math.floor(Math.random() * available.length)];
    const idx = data.amounts.findIndex(a => a.value === chosen.value && !a.takenBy);
    const newAmounts = [...data.amounts];
    newAmounts[idx] = { ...newAmounts[idx], takenBy: name };
    await updateDoc(stateRef, { amounts: newAmounts });

    document.getElementById("result-name").textContent = name + "!";
    document.getElementById("result-amount").textContent = chosen.value;
    const panel = document.getElementById("result-panel");
    panel.style.display = "block";
    panel.scrollIntoView({ behavior: "smooth", block: "center" });

    launchConfetti();
    nameEl.disabled = true;
    btn.style.display = "none";
  };

  function launchConfetti() {
    const colors = ["#ffe94d","#b57bee","#7b2ff7","#ff9de2","#ffffff","#ffb400","#00e5ff"];
    for (let i = 0; i < 100; i++) {
      setTimeout(() => {
        const p = document.createElement("div");
        p.className = "confetti-piece";
        p.style.left = Math.random() * 100 + "vw";
        p.style.background = colors[Math.floor(Math.random() * colors.length)];
        p.style.animationDuration = (1.8 + Math.random() * 2.5) + "s";
        p.style.animationDelay = Math.random() * 0.4 + "s";
        p.style.transform = `rotate(${Math.random()*360}deg)`;
        p.style.width = (6 + Math.random()*6) + "px";
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 5000);
      }, i * 18);
    }
  }

  try {
    await ensureDoc();
    listen();
  } catch(e) {
    document.getElementById("loading").style.display = "none";
    document.getElementById("error-msg").textContent = "⚠ Firebase not configured yet. See setup guide.";
    console.error(e);
  }
</script>
</body>
